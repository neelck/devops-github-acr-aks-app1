apiVersion : apps/v1
kind: Deployment
metadata:
  name: springpetclinicgit 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: springpetclinicgit
  template:
    metadata:
      labels:
        app: springpetclinicgit 
    spec:
      containers:
        - name: springpetclinicgit 
          image: aksdevopsacr1.azurecr.io/springpetclinicgit
          ports:
          - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
    name: springpetclinicgit
spec:
    type: LoadBalancer
    ports:
    - port: 80 
    selector:
        app: springpetclinicgit